<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جار التحميل...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('photo_2026-07-01_15-21-01.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        .loading-container {
            text-align: center;
            position: relative;
            width: 300px;
            background-color: rgba(255, 255, 255, 0);
            padding: 40px 30px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 40px;
            position: relative;
        }
        
        .logo-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-top-color: #4A90D9;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }
        
        .logo-inner:nth-child(2) {
            animation-delay: 0.3s;
            border-top-color: rgba(74, 144, 217, 0.7);
        }
        
        .logo-inner:nth-child(3) {
            animation-delay: 0.6s;
            border-top-color: rgba(74, 144, 217, 0.4);
        }
        
        .loading-text {
            margin-top: 40px;
            color: #4A90D9;
            font-size: 18px;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            font-weight: bold;
        }
        
        .loading-text::after {
            content: "...";
            position: absolute;
            animation: dots 1.5s infinite steps(3);
        }
        
        .progress-container {
            width: 100%;
            height: 2px;
            background-color: rgba(74, 144, 217, 0.2);
            margin-top: 30px;
            overflow: hidden;
            border-radius: 1px;
        }
        
        .progress-bar {
            height: 100%;
            width: 0;
            background-color: #4A90D9;
            border-radius: 1px;
            transition: width 0.4s ease;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes dots {
            0%, 20% { content: "."; }
            40% { content: ".."; }
            60%, 100% { content: "..."; }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="logo">
            <div class="logo-inner"></div>
            <div class="logo-inner"></div>
            <div class="logo-inner"></div>
        </div>
        
        <div class="loading-text">مجموعه المصطفي للمحاماه والاستشارات القانونيه</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
    </div>

    <script>
        let progress = 0;
        const progressBar = document.getElementById('progress');
        const loadingText = document.querySelector('.loading-text');
        
        // تحميل سريع جداً (زيادة السرعة)
        const interval = setInterval(() => {
            // زيادة أسرع بكثير
            progress += Math.random() * (progress < 80 ? 12 : 6);
            if (progress > 100) progress = 100;
            
            progressBar.style.width = progress + '%';
            
            if (progress >= 100) {
                clearInterval(interval);
                loadingText.textContent = "اكتمل التحميل!";
                
                // الانتقال بعد ثانية واحدة
                setTimeout(() => {
                    window.location.href = 'Dashboard.html';
                }, 1000);
            }
        }, 100); // تم تقليل الفاصل الزمني من 200 إلى 100 مللي
    </script>
</body>
</html>
